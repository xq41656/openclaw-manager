<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; line-height: 1.6; }
        header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 0; margin-bottom: 0; }
        .container { max-width: 1600px; margin: 0 auto; padding: 0 20px; }
        header h1 { color: #58a6ff; font-size: 24px; display: flex; align-items: center; gap: 12px; }
        .nav-tabs { display: flex; gap: 10px; margin-top: 12px; }
        .nav-tab { padding: 8px 16px; background: #21262d; border: 1px solid #30363d; border-radius: 6px; cursor: pointer; color: #8b949e; transition: all 0.2s; }
        .nav-tab:hover, .nav-tab.active { background: #238636; color: white; border-color: #238636; }
        main { padding: 20px; }
        .iframe-wrapper { display: none; height: calc(100vh - 180px); }
        .iframe-wrapper.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; background: #0d1117; }
        .last-updated { text-align: center; color: #8b949e; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🐙 OpenClaw Manager</h1>
            <div class="nav-tabs">
                <div class="nav-tab active" onclick="switchTab('overview')">📊 总览</div>
                <div class="nav-tab" onclick="switchTab('templates')">📋 模板</div>
                <div class="nav-tab" onclick="switchTab('projects')">📁 项目</div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="iframe-overview" class="iframe-wrapper active">
            <iframe src="templates/overview.html" title="总览" onload="iframeLoaded('overview')"></iframe>
        </div>
        <div id="iframe-templates" class="iframe-wrapper">
            <iframe src="templates/templates.html" title="模板" onload="iframeLoaded('templates')"></iframe>
        </div>
        <div id="iframe-projects" class="iframe-wrapper">
            <iframe src="templates/projects.html" title="项目" onload="iframeLoaded('projects')"></iframe>
        </div>
    </main>

    <div class="last-updated">最后更新: <span id="last-updated">-</span></div>

    <script>
        let iframeReady = { overview: false, templates: false, projects: false };

        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.iframe-wrapper').forEach(x => x.classList.remove('active'));
            
            const tabs = document.querySelectorAll('.nav-tab');
            if (tabName === 'overview') tabs[0].classList.add('active');
            if (tabName === 'templates') tabs[1].classList.add('active');
            if (tabName === 'projects') tabs[2].classList.add('active');
            
            document.getElementById('iframe-' + tabName).classList.add('active');
            
            if (iframeReady[tabName]) {
                try {
                    const iframe = document.getElementById('iframe-' + tabName).querySelector('iframe');
                    if (tabName === 'templates' && iframe.contentWindow.loadTemplates) {
                        iframe.contentWindow.loadTemplates();
                    } else if (tabName === 'projects' && iframe.contentWindow.loadProjects) {
                        iframe.contentWindow.loadProjects();
                    } else if (tabName === 'overview' && iframe.contentWindow.loadContainers) {
                        iframe.contentWindow.loadContainers();
                    }
                } catch(e) {
                    console.log('Cannot access iframe:', e.message);
                }
            }
        }

        function iframeLoaded(tabName) {
            iframeReady[tabName] = true;
            console.log(tabName + ' iframe loaded');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const now = new Date();
            document.getElementById('last-updated').textContent = now.toLocaleString('zh-CN');
            setInterval(function() {
                const now = new Date();
                document.getElementById('last-updated').textContent = now.toLocaleString('zh-CN');
            }, 60000);
        });
    </script>
</body>
</html>
